<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>About — Ava Blavatnik Photography</title>
  <meta name="description" content="About Ava Blavatnik — photographer.">
  <link rel="canonical" href="/about">
  <link rel="icon" type="image/png" href="/AppIcon.png">
  <link rel="apple-touch-icon" href="/AppIcon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=LTC+Bodoni+175&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>

  <header>
    <a href="/" class="site-title">Ava Blavatnik</a>
    <nav id="nav" aria-label="Main navigation">
      <a href="/" class="nav-link">Gallery</a>
      <a href="/about" class="nav-link active">About</a>
    </nav>
    <button class="hamburger" id="hamburger" aria-label="Toggle menu">
      <span></span><span></span><span></span>
    </button>
  </header>

  <main class="about-page">
    <div class="about-content">
      <div class="about-portrait" id="about-portrait">
        <div class="portrait-placeholder"></div>
      </div>
      <div class="about-text">
        <h1>About</h1>
        <div id="about-description"></div>

        <div class="about-contact">
          <h2>Contact</h2>
          <div id="about-contacts"></div>
        </div>
      </div>
    </div>
  </main>

  <footer>
    <p>Ava Blavatnik</p>
  </footer>

  <script>
    document.getElementById('hamburger').addEventListener('click', () => {
      document.getElementById('nav').classList.toggle('open');
    });
  </script>
  <script src="/about.js"></script>
</body>
</html>
