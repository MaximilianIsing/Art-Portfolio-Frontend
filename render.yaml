services:
  - type: web
    name: ava-blavatnik-gallery
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
    disk:
      name: gallery-uploads
      mountPath: /opt/render/project/src/uploads
      sizeGB: 1
