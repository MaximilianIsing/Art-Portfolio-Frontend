services:
  - type: web
    name: ava-blavatnik-gallery
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /opt/render/project/src/data
    disk:
      name: gallery-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
